name: Build and Publish to Nexus

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app (production)
        run: npm run build -- --configuration production

      - name: Create distribution archive
        run: |
          cd dist/RentACar-FrontEnd
          zip -r ../../app-build-${{ github.run_number }}.zip .
          cd ../../
          echo "Archive created: app-build-${{ github.run_number }}.zip"
          ls -lh app-build-${{ github.run_number }}.zip

