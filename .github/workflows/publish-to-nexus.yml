name: Build and Publish to Nexus

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  # Set to the folder that contains package.json / angular.json if not repo root.
  # Example: './RentA-Car-FrontEnd-Angular' if the project is in that subfolder.
  PROJECT_DIR: '.'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies (ci then fallback to install)
        run: |
          set -e
          cd "${{ env.PROJECT_DIR }}"
          npm ci || npm install --no-audit --no-fund
        shell: bash

      - name: Build Angular app
        run: |
          cd "${{ env.PROJECT_DIR }}"
          npm run build -- --configuration production
        shell: bash

      - name: Create ZIP of dist
        run: |
          sudo apt-get update && sudo apt-get install -y zip
          DIST_DIR=$(ls -d "${GITHUB_WORKSPACE}/${{ env.PROJECT_DIR }}/dist/"* 2>/dev/null | head -n1 || true)
          if [ -z "$DIST_DIR" ]; then
            echo "dist output not found in ${{ env.PROJECT_DIR }}/dist"
            exit 1
          fi
          ZIP_NAME=angular-dist-${{ github.run_number }}.zip
          cd "$DIST_DIR"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" .
          echo "$ZIP_NAME created"
        shell: bash

      - name: Upload ZIP to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          ZIP_NAME=angular-dist-${{ github.run_number }}.zip
          FILE="${GITHUB_WORKSPACE}/${ZIP_NAME}"
          if [ ! -f "$FILE" ]; then
            echo "Artifact $FILE not found"; exit 1
          fi
          curl --fail --show-error -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            --upload-file "${FILE}" \
            "${NEXUS_URL}/repository/${NEXUS_REPO}/${ZIP_NAME}"
        shell: bash

      - name: Upload artifact to Actions (backup)
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: angular-dist-${{ github.run_number }}.zip
