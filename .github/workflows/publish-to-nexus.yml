name: Build and Publish to Nexus

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  PROJECT_DIR: '.'   # set to './subfolder' if your package.json/angular.json are in a subfolder

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Create ZIP of dist
        run: |
          sudo apt-get update && sudo apt-get install -y zip
          ZIP_NAME=angular-dist-${{ github.run_number }}.zip
          DIST_DIR=$(ls -d ${GITHUB_WORKSPACE}/${{ env.PROJECT_DIR }}/dist/* | head -n1 || true)
          if [ -z "$DIST_DIR" ]; then
            echo "Error: dist output not found under ${{ env.PROJECT_DIR }}/dist"
            exit 1
          fi
          cd "${DIST_DIR}"
          zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" . 
          echo "$ZIP_NAME created at $GITHUB_WORKSPACE/$ZIP_NAME"
        shell: bash

      - name: Upload ZIP to Nexus
        env:
          NEXUS_URL: ${{ secrets.NEXUS_URL }}
          NEXUS_REPO: ${{ secrets.NEXUS_REPO }}
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}
        run: |
          ZIP_NAME=angular-dist-${{ github.run_number }}.zip
          FILE="${GITHUB_WORKSPACE}/${ZIP_NAME}"
          if [ ! -f "$FILE" ]; then
            echo "Artifact $FILE not found"
            exit 1
          fi
          echo "Uploading $FILE to ${NEXUS_URL}/repository/${NEXUS_REPO}/${ZIP_NAME}"
          curl --fail --show-error -u "${NEXUS_USERNAME}:${NEXUS_PASSWORD}" \
            --upload-file "${FILE}" \
            "${NEXUS_URL}/repository/${NEXUS_REPO}/${ZIP_NAME}"
        shell: bash

      - name: Upload artifact to Actions (backup)
        uses: actions/upload-artifact@v4
        with:
          name: angular-build
          path: angular-dist-${{ github.run_number }}.zip
