name: Build and Publish to Nexus

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: RentA-Car-FrontEnd-Angular

      - name: Build Angular app
        run: npm run build --prod
        working-directory: RentA-Car-FrontEnd-Angular

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: angular-build
          path: RentA-Car-FrontEnd-Angular/dist/**/*

      - name: Publish to Nexus
        run: |
          curl -v -u $NEXUS_USERNAME:$NEXUS_PASSWORD --upload-file RentA-Car-FrontEnd-Angular/dist/<your-artifact-file> http://<your-nexus-repo-url>/<your-repo-path>
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}